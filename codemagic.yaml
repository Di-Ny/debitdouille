# =============================================================================
# Codemagic CI/CD — Pulvérisateur (Débitdouille)
# Build iOS sur Mac hébergé + signature automatique (clé API App Store Connect)
# + upload vers App Store Connect / TestFlight. Aucun Mac local requis.
#
# IMPORTANT (monorepo) : ce fichier DOIT être à la RACINE du dépôt (Codemagic n'y
# cherche la config qu'à la racine). L'app Flutter étant dans un sous-dossier,
# chaque workflow définit `working_directory: App/flutter/debitdouille`.
# ⚠️ Les chemins `artifacts:` sont résolus depuis la RACINE DU CLONE (pas depuis
# working_directory) → ils sont préfixés par App/flutter/debitdouille/.
#
# Réutilise l'intégration App Store Connect "FURGO_ASC" (même compte Apple,
# Team ID D284NZAZ6C). L'app n'a aucun secret de build.
# =============================================================================

workflows:
  ios-testflight:
    name: iOS – Build & TestFlight (Pulvérisateur)
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: App/flutter/debitdouille
    integrations:
      # Doit correspondre au nom de la clé API dans Codemagic > Integrations.
      app_store_connect: FURGO_ASC
    environment:
      flutter: 3.35.2          # version épinglée = version de dev locale
      xcode: latest            # Apple impose le SDK iOS 26+ (Xcode 26+) à l'upload
      cocoapods: default
      vars:
        BUNDLE_ID: "fr.furgo.pulverisateur"
        APP_STORE_APP_ID: "6783067937"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install (résolution fraîche)
        script: |
          set -e
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
          cd ..
      - name: Nettoyer les certificats de distribution orphelins
        script: |
          # La clé privée n'étant pas persistée, les certificats précédents sont
          # inutilisables et consomment les emplacements limités par Apple. On les
          # révoque avant d'en recréer un (mêmes variables ASC que FURGO).
          node <<'NODE' || true
          const c=require('crypto'),h=require('https');
          let pem=process.env.APP_STORE_CONNECT_PRIVATE_KEY||'';
          pem=pem.replace(/\\n/g,'\n').trim();
          if(pem && !/BEGIN/.test(pem)){const body=pem.replace(/\s+/g,'').replace(/(.{64})/g,'$1\n').replace(/\n$/,'');pem='-----BEGIN PRIVATE KEY-----\n'+body+'\n-----END PRIVATE KEY-----\n';}
          const kid=process.env.APP_STORE_CONNECT_KEY_IDENTIFIER, iss=process.env.APP_STORE_CONNECT_ISSUER_ID;
          if(!pem||!kid||!iss){console.log('Variables ASC absentes, étape ignorée');process.exit(0);}
          const now=Math.floor(Date.now()/1000);
          const b=o=>Buffer.from(JSON.stringify(o)).toString('base64url');
          const si=b({alg:'ES256',kid,typ:'JWT'})+'.'+b({iss,iat:now,exp:now+600,aud:'appstoreconnect-v1'});
          const jwt=si+'.'+c.sign('SHA256',Buffer.from(si),{key:pem,dsaEncoding:'ieee-p1363'}).toString('base64url');
          const rq=(m,p)=>new Promise((res,rej)=>{const r=h.request({host:'api.appstoreconnect.apple.com',path:p,method:m,headers:{Authorization:'Bearer '+jwt}},x=>{let d='';x.on('data',k=>d+=k);x.on('end',()=>res({s:x.statusCode,d}))});r.on('error',rej);r.end()});
          (async()=>{const r=await rq('GET','/v1/certificates?limit=200');const ds=(JSON.parse(r.d).data||[]).filter(x=>/DISTRIBUTION/.test(x.attributes.certificateType));console.log('Certificats DISTRIBUTION:',ds.length);for(const x of ds){const z=await rq('DELETE','/v1/certificates/'+x.id);console.log('  révoqué',x.id,z.s)}})();
          NODE
      - name: Signature iOS (création auto du certificat + profil via clé API)
        script: |
          set -e
          keychain initialize
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            export CERTIFICATE_PRIVATE_KEY="$(openssl genrsa 2048 2>/dev/null)"
            echo "Clé privée générée pour ce build"
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          # Numéro de build = (dernier build App Store Connect + 1), démarre à 1.
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          BN=$((LATEST + 1))
          echo "Build number = $BN"
          flutter build ipa --release \
            --no-tree-shake-icons \
            --build-number=$BN \
            --dart-define=BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M)" \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload vers App Store Connect (sans attendre le processing)
        script: |
          set -e
          app-store-connect publish \
            --path 'build/ios/ipa/*.ipa' \
            --max-build-processing-wait 0
    artifacts:
      - App/flutter/debitdouille/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - nicolas.dauy@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # Captures d'écran App Store (simulateur iPhone Pro Max, 6,9")
  # Données injectées via DataProvider.pushSimulatedFrame (pas d'appareil BLE).
  # ---------------------------------------------------------------------------
  ios-screenshots:
    name: iOS – Captures App Store (Pulvérisateur)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: App/flutter/debitdouille
    environment:
      flutter: 3.35.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install (résolution fraîche)
        script: |
          set -e
          cd ios && rm -f Podfile.lock && pod install --repo-update && cd ..
      - name: Boot simulateur 6,9" + captures (integration_test)
        script: |
          set -e
          echo "--- Simulateurs iPhone disponibles ---"
          xcrun simctl list devices available | grep -i "iPhone" || true
          UDID=$(xcrun simctl list devices available | grep -E "iPhone.*Pro Max" | grep -oiE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" | head -1)
          if [ -z "$UDID" ]; then
            echo "Pas de Pro Max, repli sur un iPhone quelconque"
            UDID=$(xcrun simctl list devices available | grep -E "iPhone" | grep -oiE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" | head -1)
          fi
          if [ -z "$UDID" ]; then echo "Aucun simulateur iPhone disponible"; exit 1; fi
          echo "Simulateur UDID=$UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          xcrun simctl status_bar "$UDID" override --time "9:41" --batteryState charged --batteryLevel 100 --cellularBars 4 --wifiBars 3 || true
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshots_test.dart \
            -d "$UDID"
      - name: Lister les captures
        script: ls -la screenshots || true
    artifacts:
      - App/flutter/debitdouille/screenshots/*.png
    publishing:
      email:
        recipients:
          - nicolas.dauy@gmail.com
        notify:
          success: true
          failure: true
