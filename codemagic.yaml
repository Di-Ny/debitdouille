# =============================================================================
# Codemagic CI/CD — Pulvérisateur (Débitdouille)
# Build iOS sur Mac hébergé + signature automatique (clé API App Store Connect)
# + upload vers App Store Connect / TestFlight. Aucun Mac local requis.
#
# IMPORTANT (monorepo) : ce fichier DOIT être à la RACINE du dépôt (Codemagic n'y
# cherche la config qu'à la racine). L'app Flutter étant dans un sous-dossier,
# chaque workflow définit `working_directory: App/flutter/debitdouille`.
# ⚠️ Les chemins `artifacts:` sont résolus depuis la RACINE DU CLONE (pas depuis
# working_directory) → ils sont préfixés par App/flutter/debitdouille/.
#
# SIGNATURE : le compte Apple est partagé avec FURGO (limite Apple ~2 certificats
# de distribution). Pour ne PAS créer/révoquer de certificat à chaque build (ce
# qui saturait la limite et risquait de révoquer celui de FURGO), on PERSISTE une
# clé RSA dédiée dans la variable sécurisée CERTIFICATE_PRIVATE_KEY (groupe
# debitdouille_ios). fetch-signing-files réutilise alors toujours le même
# certificat. Intégration App Store Connect "FURGO_ASC" (Team D284NZAZ6C).
# =============================================================================

workflows:
  ios-testflight:
    name: iOS – Build & TestFlight (Pulvérisateur)
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: App/flutter/debitdouille
    integrations:
      app_store_connect: FURGO_ASC
    environment:
      flutter: 3.35.2
      xcode: latest
      cocoapods: default
      groups:
        - debitdouille_ios     # contient CERTIFICATE_PRIVATE_KEY (clé du certificat, persistée)
      vars:
        BUNDLE_ID: "fr.furgo.pulverisateur"
        APP_STORE_APP_ID: "6783067937"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install (résolution fraîche)
        script: |
          set -e
          cd ios
          rm -f Podfile.lock
          pod install --repo-update
          cd ..
      - name: Signature iOS (certificat réutilisé via clé persistée)
        script: |
          set -e
          keychain initialize
          # CERTIFICATE_PRIVATE_KEY est persistée (groupe debitdouille_ios) → on
          # réutilise le MÊME certificat de distribution à chaque build. --create
          # ne crée un certificat que s'il n'en existe pas encore pour cette clé
          # (1er build). On ne révoque rien : le certificat de FURGO n'est jamais
          # touché sur le compte partagé.
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "ERREUR : CERTIFICATE_PRIVATE_KEY absente (groupe debitdouille_ios non importé ?)"; exit 1
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set -e
          # Numéro de build = (dernier build App Store Connect + 1), démarre à 1.
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          BN=$((LATEST + 1))
          echo "Build number = $BN"
          flutter build ipa --release \
            --no-tree-shake-icons \
            --build-number=$BN \
            --dart-define=BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M)" \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Upload vers App Store Connect (sans attendre le processing)
        script: |
          set -e
          app-store-connect publish \
            --path 'build/ios/ipa/*.ipa' \
            --max-build-processing-wait 0
    artifacts:
      # Chemins relatifs au working_directory (App/flutter/debitdouille).
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - nicolas.dauy@gmail.com
        notify:
          success: true
          failure: true

  # ---------------------------------------------------------------------------
  # Captures d'écran App Store (simulateur iPhone Pro Max, 6,9")
  # Données injectées via DataProvider.pushSimulatedFrame (pas d'appareil BLE).
  # Pas de signature → pas besoin du certificat.
  # ---------------------------------------------------------------------------
  ios-screenshots:
    name: iOS – Captures App Store (Pulvérisateur)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: App/flutter/debitdouille
    environment:
      flutter: 3.35.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install (résolution fraîche)
        script: |
          set -e
          cd ios && rm -f Podfile.lock && pod install --repo-update && cd ..
      - name: Boot simulateur 6,9" + captures (integration_test)
        script: |
          set -e
          echo "--- Simulateurs iPhone disponibles ---"
          xcrun simctl list devices available | grep -i "iPhone" || true
          UDID=$(xcrun simctl list devices available | grep -E "iPhone.*Pro Max" | grep -oiE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" | head -1)
          if [ -z "$UDID" ]; then
            echo "Pas de Pro Max, repli sur un iPhone quelconque"
            UDID=$(xcrun simctl list devices available | grep -E "iPhone" | grep -oiE "[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}" | head -1)
          fi
          if [ -z "$UDID" ]; then echo "Aucun simulateur iPhone disponible"; exit 1; fi
          echo "Simulateur UDID=$UDID"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true
          xcrun simctl status_bar "$UDID" override --time "9:41" --batteryState charged --batteryLevel 100 --cellularBars 4 --wifiBars 3 || true
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshots_test.dart \
            -d "$UDID"
      - name: Lister les captures
        script: ls -la screenshots || true
    artifacts:
      # Chemin relatif au working_directory (App/flutter/debitdouille).
      - screenshots/*.png
    publishing:
      email:
        recipients:
          - nicolas.dauy@gmail.com
        notify:
          success: true
          failure: true
