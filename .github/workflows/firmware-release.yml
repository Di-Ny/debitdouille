# Release firmware OTA — voir docs/ota.md
#
# Déclenché par un tag `fw-vX.Y.Z`. Compile les 3 variantes ESP32, calcule les
# SHA-256, génère le manifest.json et publie le tout dans une release GitHub.
# L'app Flutter consomme ces releases (filtre sur le préfixe de tag `fw-v`).
#
# La version injectée dans le firmware vient du tag (FW_VERSION_MAJOR/MINOR/PATCH),
# ce qui garantit que `get_info` annonce exactement la version du manifest.
name: Firmware Release

on:
  push:
    tags:
      - 'fw-v*'

permissions:
  contents: write

env:
  # Version minimale de l'app Flutter capable de piloter cette mise à jour OTA
  MIN_APP_VERSION: '2.1.0'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # nécessaire pour lire le message du tag annoté (changelog)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer PlatformIO
        run: pip install platformio

      - name: Extraire la version du tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#fw-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ ]]; then
            echo "Tag invalide: $GITHUB_REF_NAME (attendu fw-vX.Y.Z)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=${PATCH:-0}" >> "$GITHUB_OUTPUT"

      - name: Compiler les 3 variantes
        env:
          PLATFORMIO_BUILD_FLAGS: >-
            -D FW_VERSION_MAJOR=${{ steps.ver.outputs.major }}
            -D FW_VERSION_MINOR=${{ steps.ver.outputs.minor }}
            -D FW_VERSION_PATCH=${{ steps.ver.outputs.patch }}
        run: |
          pio run -d Arduino/Debitdouille_V2 \
            -e nodemcu-32s -e seeed_xiao_esp32c3 -e seeed_xiao_esp32s3

      - name: Préparer les artefacts et le manifest
        env:
          FW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p release
          cp Arduino/Debitdouille_V2/.pio/build/nodemcu-32s/firmware.bin        release/firmware_v1.bin
          cp Arduino/Debitdouille_V2/.pio/build/seeed_xiao_esp32c3/firmware.bin release/firmware_c3.bin
          cp Arduino/Debitdouille_V2/.pio/build/seeed_xiao_esp32s3/firmware.bin release/firmware_s3.bin

          # Changelog = message du tag annoté (vide pour un tag léger).
          # actions/checkout remplace les tags annotés par des refs simples vers le
          # commit : il faut re-fetcher le vrai tag pour récupérer son annotation.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          CHANGELOG="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          export CHANGELOG

          python3 - <<'EOF'
          import hashlib, json, os, datetime

          def entry(path):
              data = open(path, 'rb').read()
              return {
                  'file': os.path.basename(path),
                  'size': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              }

          manifest = {
              'version': os.environ['FW_VERSION'],
              'release_date': datetime.date.today().isoformat(),
              'binaries': {
                  'ESP32-WROOM-32': entry('release/firmware_v1.bin'),
                  'XIAO ESP32-C3': entry('release/firmware_c3.bin'),
                  'XIAO ESP32-S3': entry('release/firmware_s3.bin'),
              },
              'changelog': os.environ.get('CHANGELOG', '').strip(),
              'min_app_version': os.environ['MIN_APP_VERSION'],
          }
          with open('release/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
          print(open('release/manifest.json').read())
          EOF

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Firmware ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            release/firmware_v1.bin
            release/firmware_c3.bin
            release/firmware_s3.bin
            release/manifest.json
